# Git Hooks 配置文件
# Echo Ad Astra TRPG 创作系统

version:
  current: "3.8.0"
  auto_increment: true

pre_commit:
  enabled: true
  checks:
    - yaml_syntax      # 检查 YAML 语法
    - markdown_format  # 检查 Markdown 格式（基础检查）
    - version_update   # 自动更新版本号

  # 版本号自动升级规则
  version_rules:
    "rules/00-核心规则/**": "minor"        # 次版本号 +1 (3.8.0 → 3.9.0)
    "rules/01-判定系统/**": "minor"
    "rules/03-角色创建/**": "minor"
    "world-building/**": "minor"
    "rules/装备系统/**": "patch"           # 修订号 +1 (3.8.0 → 3.8.1)
    "rules/数值表/**": "patch"
    "fiction/**": "none"                   # 不影响版本号
    "*.md": "none"                         # README 等文档不影响版本号

  auto_changelog: true

post_commit:
  enabled: true
  actions:
    - update_changelog   # 更新变更日志
    - create_tag        # 创建版本标签（如果版本号变化）

pre_push:
  enabled: false       # 暂时禁用，后续实现 PDF 生成后启用
  actions:
    - build_rulebook   # 构建规则书
    - generate_pdf     # 生成 PDF

# 术语一致性检查（P1 优先级，后续实现）
terminology:
  enabled: false
  file: ".claude/terminology.yaml"
